<head>

  <style>
    canvas {
    border:1px solid #03b900;
    background-image: url("flapy.png");
    display: block;
    margin: 0 auto;
    }
    
    mygamepiece {
    background-image: url("flappybird.png");
    }
    nav ul li{
    margin: 10px;
    list-style: none;/* remove bullet points */
    color: black;
}

nav ul li a{
    text-decoration: none; /* remove underline */
    color: black;
}
body {
    background-color: #007c1b;
}
  </style>
</head>
<body onload="startGame()">
    <script src="script.js"></script>
     <br>
     <button onmousedown="accelerate(-0.2)" onmouseup="accelerate(0.05)">ACCELERATE</button>

     <button onmousedown="resumeGame()">RESUME</button>
     <button onmousedown="scoreboard()">SCOREBOARD</button>

     <button onmousedown="toggleDarkMode()">TOGGLE DARK MODE</button>
